{% extends 'base.html' %}

{% block content %}

<main class="container">
<div class="box">
<h2>Asistencias</h2>
    <div class="row">
        <a class="btn" href="{% url 'turno:asistencia_create' %}">Registrar entrada/salida</a>
        <div class="col">
            <ul>
                 
                <table>
                    <thead>
                    <tr>
                        <th>Usuario</th>
                        <th>Fecha</th>
                        <th>Entrada</th>
                        <th>Salida</th>
                    </tr>
                    </thead>
                    <tbody>
                        {% for a in object_list %}
                    <tr>
                        <td>{{ a.usuario }}</td>
                        <td>{{ a.fecha }}</td>
                        <td>{{ a.hora_entrada }}</td>
                        <td>{{ a.hora_salida|default:"---" }}</td>
                    </tr>
                    {% empty %}
                    {% endfor %}
                    </tbody>
                </table>
            </ul>
        </div>
    </div>
</div>
</main>
{% endblock %}
