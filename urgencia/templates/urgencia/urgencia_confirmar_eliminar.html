{% extends "base.html" %}
{% block content %}

<h2>Confirmar eliminación de urgencia</h2>

<div class="marco">
  <p>¿Estás seguro de eliminar la urgencia de <strong>{{ urgencia.paciente }}</strong>?</p>
  <hr>
  <form method="post">
    {% csrf_token %}
    <button class="btn" type="submit">Sí, eliminar</button>
    <a class="btn" href="{% url 'urgencia:detalle_urgencia' urgencia.id %}">No, volver</a>
  </form>
    <hr>
</div>

{% endblock %}
