{% extends "base.html" %}

{% block content %}
        
<main class="container">
<div class="box">
  <h2>Agregar Medicamento a la Receta</h2>
    <div class="row">
        <div class="col">
        <form method="post" >
             <section>
            {% csrf_token %}

            {% for field in form %}
           
                <label>{{ field.label }}</label>
                {{ field }}
                {{ field.errors }}
             
            {% endfor %}
                <div style="display: flex; gap: 10px;">
                    <button class="btn">Guardar</button>
                    <a href="{% url 'farmacia:receta_list' %}" class="btn">Regresar</a>
                </div>
            </section>
        </form>
    </div>
    </div>
</div>
</main>
{% endblock %}
