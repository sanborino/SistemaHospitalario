{% extends "base.html" %}

{% block content %}
        
<main class="container">
<div class="box">
  <h2>Agregar Medicamento a la Receta</h2>
    <div class="row">
        <div class="col">
        <form method="post" >
            {% csrf_token %}

            {% for field in form %}

                <label>{{ field.label }}</label>
                {{ field }}
                {{ field.errors }}

            {% endfor %}

            <button class="btn">Guardar</button>
        </form>
    </div>
    </div>
</div>
</main>
{% endblock %}
