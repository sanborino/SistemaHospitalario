{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container mt-4">

    <h2 class="mb-4 text-danger">Eliminar Medicamento</h2>

    <div class="card shadow-sm">
        <div class="card-body">

            <p class="fs-5">
                ¿Estás seguro de que deseas eliminar el medicamento
                <strong>{{ object.nombre }}</strong>?
            </p>

            <p class="text-muted">
                Esta acción no se puede deshacer.
            </p>

            <form method="post">
                {% csrf_token %}

                <div class="mt-3">
                    <a href="{% url 'farmacia:medicamento_list' %}" class="btn">
                        Cancelar
                    </a>

                    <button type="submit" class="btn">
                        Sí, eliminar
                    </button>
                </div>
            </form>

        </div>
    </div>

</div>
{% endblock %}
