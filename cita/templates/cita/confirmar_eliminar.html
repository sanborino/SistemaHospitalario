{% extends "base.html" %}
{% block content %}
<main class="container">
<div class="box">
   <h2>Eliminar cita</h2>
    <div class="row">
        <div class="col">
<p>¿Seguro que deseas eliminar la cita #{{ object.id }} del {{ object.fecha }} ({{ object.hora }})?</p>
      <hr>
<form method="post">
  {% csrf_token %}
  <div style="display: flex; gap: 10px;">
  <button class="btn" type="submit">Sí, eliminar</button>
  <a class="btn" href="{% url 'cita:detalle_cita' object.id %}">Cancelar</a>
  </div>
</form>
<hr>
</div>
</div>
</div>
</main>
{% endblock %}
