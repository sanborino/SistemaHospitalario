{% extends "base.html" %}
{% block content %}


<main class="container">
<div class="box">
<h2>Confirmar eliminación de habitación</h2>
    <div class="row">
        <div class="col">
  <p>¿Estás seguro de eliminar la habitación <strong>{{ habitacion.numero }}</strong> de <strong>{{ habitacion.area }}</strong>?</p>
<hr>
  <form method="post">
    {% csrf_token %}
<div style="display: flex; gap: 10px;">
    <button class="btn" type="submit">Sí, eliminar</button>
    <a class="btn" href="{% url 'infraestructura:detalle_habitacion' habitacion.id %}">No, volver</a>
</div>

  </form>
    <hr>
</div>
</div>
</div>
</main>

{% endblock %}
