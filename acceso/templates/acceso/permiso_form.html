{% extends "base.html" %}
{% block content %}

<h2>{{ titulo }}</h2>
<div id="content">
    <div class="marco">
        <div class="formulario">
            <form method="post">
                <div class="campo">
                {% csrf_token %}
                {{ form.as_p }}
                </div>
                <button class="btn" type="submit">Guardar</button>
                <a href="{% url 'acceso:permiso_lista' %}" class="btn">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
