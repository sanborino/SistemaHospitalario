{% extends "base.html" %}
{% block content %}

<h2>Lista de Permisos</h2>
<div id="content">
    <div class="marco">
        <a href="{% url 'acceso:permiso_crear' %}" class="btn">Crear Permiso</a>
        <div class="formulario">
            <table class="tabla-moderna">
                <thead>
                    <tr>
                        <th>Permiso</th>
                        <th>Descripción</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for permiso in permisos %}
                    <tr>
                        <td>{{ permiso.nombre }}</td>
                        <td>{{ permiso.descripcion }}</td>
                        <td>
                            <a href="{% url 'acceso:permiso_editar' permiso.pk %}" class="btn">Editar</a>
                            <a href="{% url 'acceso:permiso_eliminar' permiso.pk %}" class="btn">Eliminar</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="3">No hay permisos registrados.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
