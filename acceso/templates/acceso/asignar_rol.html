{% extends "base.html" %}
{% block content %}

<main class="container">
<div class="box">
    <h2>Asignar rol a: {{ usuario.username }}</h2>
    <div class="row">
        <div class="col">
            <form method="post">
                <section>
                {% csrf_token %}
                {{ form.as_p }}
                <div style="display: flex; gap: 10px;">
                <button class="btn" type="submit">Asignar</button>
                <a href="{% url 'acceso:usuario_detalle' usuario.pk %}" class="btn">Cancelar</a>
                </div>
             </section>
            </form>
        </div>
    </div>
</div>
</main>
{% endblock %}
