{% extends 'base.html' %}

{% block content %}

<main class="container">
<div class="box">
    <h2>Formulario Usuario-Hospital</h2>
    <div class="row">
        <div class="col">
            <form method="post">    
                <section>
                {% csrf_token %}
                
                {{ form.as_p }}
                <div style="display: flex; gap: 10px;">
                <button class="btn" type="submit">Guardar</button>
                <a class="btn" href="{% url 'acceso:usuariohospital_list' %}">Cancelar</a>
                </div>
                </section>
            </form>
        </div>
    </div>  
</div>
</main>
{% endblock %}
