{% extends "base.html" %}
{% block content %}

<main class="container">
<div class="box">
    <h2>Lista de roles</h2>
    <div class="row">
        <div class="col">
        <a href="{% url 'acceso:rol_crear' %}" class="btn">Crear Rol</a>
        <div class="formulario">
            <table class="tabla-moderna">
                <thead>
                    <tr>
                        <th>Rol</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for rol in roles %}
                    <tr>
                        <td>{{ rol.nombre }}</td>
                        <td>
                            <div style="display: flex; gap: 10px;">
                            <a href="{% url 'acceso:rol_detalle' rol.pk %}" class="btn">Ver</a>
                            <a href="{% url 'acceso:rol_editar' rol.pk %}" class="btn">Editar</a>
                            <a href="{% url 'acceso:rol_eliminar' rol.pk %}" class="btn">Eliminar</a>
                            </div>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="2">No hay roles registrados.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
</main>
{% endblock %}
